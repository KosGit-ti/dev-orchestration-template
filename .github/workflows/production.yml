# =============================================================================
# Production ワークフロー（本番環境デプロイ・記録）
# =============================================================================
# production ブランチへの push 時に、品質ゲート + 統合テスト + 本番記録を実行する。
# プロジェクトの言語・ツールに合わせてカスタマイズしてください。

name: Production

on:
  push:
    branches: [production]

permissions:
  contents: read

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # ---------------------------------------------------------------
      # 言語セットアップ（ci.yml と同じ設定を使用）
      # ---------------------------------------------------------------

      # --- Python ---
      # - uses: actions/setup-python@v5
      #   with:
      #     python-version: "3.11"
      # - name: Install uv
      #   run: python -m pip install --upgrade pip && python -m pip install uv
      # - name: Sync dependencies
      #   run: uv sync --all-extras --dev

      # --- Node.js ---
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: "20"
      # - name: Install dependencies
      #   run: npm ci

      # ---------------------------------------------------------------
      # 品質チェック
      # ---------------------------------------------------------------

      - name: Policy check
        run: python ci/policy_check.py

      # - name: Lint
      #   run: {{RUN_PREFIX}} {{LINTER}}

      # - name: Format check
      #   run: {{RUN_PREFIX}} {{FORMATTER}}

      # - name: Type check
      #   run: {{RUN_PREFIX}} {{TYPE_CHECKER}}

      # - name: Test
      #   run: {{RUN_PREFIX}} {{TEST_RUNNER}}

  integration-test:
    runs-on: ubuntu-latest
    needs: quality-gate
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # ---------------------------------------------------------------
      # 言語セットアップ
      # ---------------------------------------------------------------

      # --- Python ---
      # - uses: actions/setup-python@v5
      #   with:
      #     python-version: "3.11"
      # - name: Install uv
      #   run: python -m pip install --upgrade pip && python -m pip install uv
      # - name: Sync dependencies
      #   run: uv sync --all-extras --dev

      # ---------------------------------------------------------------
      # 統合テスト
      # ---------------------------------------------------------------

      # - name: Integration tests
      #   run: {{RUN_PREFIX}} {{TEST_RUNNER}} tests/ -v

  production-record:
    runs-on: ubuntu-latest
    needs: integration-test
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Record production promotion
        run: |
          echo "=== Production Promotion Record ==="
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "=================================="

  # =====================================================================
  # SBOM 生成（CycloneDX）
  # =====================================================================
  sbom-generation:
    runs-on: ubuntu-latest
    needs: production-record
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@f6c3d0fe42c3cf876e3462574e4c9416b5e0f07a # v0.9.0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cyclonedx.json
          retention-days: 90
